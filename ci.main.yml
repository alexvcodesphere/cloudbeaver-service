schemaVersion: v0.2
prepare:
  steps: []
test:
  steps: []
run:
  cloudbeaver:
    healthEndpoint: http://localhost:8978/
    plan: 301
    replicas: 1
    network:
      ports:
        - port: 8978
          isPublic: false
      paths:
        - port: 8978
          path: /
    env:
      PG_HOST: ms-postgres-v1-${{ team.id }}-landscape-${{ workspace.id }}-dbeaver-pg.ms-postgres
      PG_PORT: "5432"
      PG_USER: ${{ workspace.env['PG_USER'] }}
      PG_DATABASE: ${{ workspace.env['PG_DATABASE'] }}
      PG_PASSWORD: ${{ vault.PG_USER_PASSWORD }}
    runAsUser: 1501
    runAsGroup: 1010
    volumeMounts:
      - name: _workspace
        mountPath: /opt/cloudbeaver/workspace
        workspacePath: cloudbeaver-workspace
      - name: _workspace
        mountPath: /opt/cloudbeaver/logs
        workspacePath: cloudbeaver-logs
    image: dbeaver/cloudbeaver
  dbeaver-pg:
    provider:
      name: postgres
      version: v1
    plan:
      id: 0
      parameters:
        cpu: 5
        memory: 512
    config:
      version: ${{ workspace.env['PG_VERSION'] }}
    secrets:
      userPassword: ${{ vault.PG_USER_PASSWORD }}
      superuserPassword: ${{ vault.PG_USER_PASSWORD }}
